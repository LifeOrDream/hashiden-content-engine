name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck-and-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run demo:fixture
