name: Prompt quality issue
description: Report a pet identity, composition, expression, or meme-readability problem.
title: "[Prompt Quality]: "
labels:
  - "area: prompts"
  - "proof: needed"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What output quality issue are you seeing?
      placeholder: The crab loses its face marking between the PFP and expression sheet.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - mint full body
        - mint PFP
        - evolution art
        - expression sheet
        - rare card
        - contract validation
        - other
    validations:
      required: true
  - type: textarea
    id: prompt_packet
    attributes:
      label: Prompt packet or fixture
      description: Paste the relevant prompt packet, fixture, or command. Redact secrets.
      render: shell
    validations:
      required: true
  - type: textarea
    id: media_proof
    attributes:
      label: Media proof
      description: Add image links, screenshots, request ids, or before/after evidence.
  - type: textarea
    id: proposed_fix
    attributes:
      label: Proposed fix
      description: If you know the likely prompt direction, describe it.
